desc: >
  OCaml Autodiff is a from-scratch automatic differentiation engine in OCaml.
  It parses mathematical expressions, evaluates them, and computes gradients
  with reverse-mode autodiff. The system also includes a gradient-descent
  training demo for a simple regression model, showing how autodiff powers
  optimization workflows used in modern machine learning.
